  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Poppins Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Preload hero poster -->
    <link rel="preload" as="image" href="/fwhaposter.webp" />
    <script type="module" crossorigin src="/assets/index-28c6aead.js"></script>
    <link rel="stylesheet" href="/assets/index-1290bfe2.css">
  </head>

  <body>
    <div id="root"></div>

    <!-- GLOBAL HCPWidget OVERRIDE (FieldPulse Modal) -->
    <script>
      window.HCPWidget = {
        openModal: function () {
          // Prevent duplicate modals
          if (document.getElementById("fp-modal")) return;

          const modal = document.createElement("div");
          modal.id = "fp-modal";
          modal.style.position = "fixed";
          modal.style.top = "0";
          modal.style.left = "0";
          modal.style.width = "100%";
          modal.style.height = "100%";
          modal.style.background = "rgba(0,0,0,0.75)";
          modal.style.display = "flex";
          modal.style.alignItems = "center";
          modal.style.justifyContent = "center";
          modal.style.zIndex = "9999";

          modal.innerHTML = `
            <div style="
              position: relative;
              width: 95%;
              max-width: 1000px;
              height: 90%;
              background: white;
              border-radius: 12px;
              overflow: hidden;
              box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            ">
              <button 
                onclick="document.getElementById('fp-modal').remove()"
                style="
                  position:absolute;
                  top:12px;
                  right:18px;
                  font-size:28px;
                  font-weight:bold;
                  background:none;
                  border:none;
                  cursor:pointer;
                  z-index:10;
                ">
                ×
              </button>

              <iframe
                src="https://portal.fieldpulse.com/fortworthheatandair"
                width="100%"
                height="100%"
                style="border:none;"
                title="Request Service"
              ></iframe>
            </div>
          `;

          // Close when clicking outside modal
          modal.addEventListener("click", function (e) {
            if (e.target === modal) {
              modal.remove();
            }
          });

          document.body.appendChild(modal);
        }
      };
    </script>

    <!-- React App -->
    
  </body>
</html>
